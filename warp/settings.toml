[appearance]

[appearance.themes]
system_theme = false
theme = "dark"

[appearance.vertical_tabs]
enabled = true
display_granularity = "tabs"
tab_item_mode = "focused_session"
view_mode = "expanded"
primary_info = "command"
show_diff_stats = false
show_pr_link = true

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[appearance.window]
zoom_level = 100

[appearance.input]
input_mode = "waterfall"

[appearance.panes]
should_dim_inactive_panes = true

[appearance.tabs]
show_indicators_button = true
workspace_decoration_visibility = "always_show"

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true

[warp_drive]
enabled = true

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = true

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.other]
show_agent_notifications = false

[text_editing]
vim_mode_enabled = true

[terminal]

[terminal.input]
alias_expansion_enabled = true
input_box_type_setting = "universal"
honor_ps1 = false

[general]
default_session_mode = "terminal"
default_tab_config_path = "/Users/mhonc@dnanexus.com/.warp/tab_configs/dig-frontend.toml"

[notifications]

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = false
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "dismissed"
play_notification_sound = true
